<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Timesoft.Solution.Demo Flow Diagram</title>
  <desc id="desc">A vertical flow diagram showing MVC UI, Framework API, background task, RealtimeHub, and browser progress updates.</desc>

  <defs>
    <style>
      .page {
        fill: #f7f9fb;
      }

      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 34px;
        font-weight: 700;
        fill: #17202a;
      }

      .subtitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        fill: #53616f;
      }

      .box {
        fill: #ffffff;
        stroke: #9aa8b6;
        stroke-width: 2;
        rx: 8;
        ry: 8;
      }

      .ui {
        stroke: #2f80ed;
      }

      .api {
        stroke: #219653;
      }

      .hub {
        stroke: #9b51e0;
      }

      .browser {
        stroke: #f2994a;
      }

      .step {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 19px;
        font-weight: 700;
        fill: #17202a;
      }

      .detail {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        fill: #415060;
      }

      .tag {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        font-weight: 700;
        fill: #ffffff;
      }

      .tag-bg-ui {
        fill: #2f80ed;
      }

      .tag-bg-api {
        fill: #219653;
      }

      .tag-bg-hub {
        fill: #9b51e0;
      }

      .tag-bg-browser {
        fill: #f2994a;
      }

      .arrow {
        stroke: #5f6f7f;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrowhead);
      }

      .note {
        fill: #fff8e6;
        stroke: #e0b44a;
        stroke-width: 2;
        rx: 8;
        ry: 8;
      }

      .note-text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        fill: #5c4610;
      }
    </style>

    <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6f7f" />
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1200" height="1600" />

  <text class="title" x="600" y="58" text-anchor="middle">Job Realtime Status Flow</text>
  <text class="subtitle" x="600" y="90" text-anchor="middle">Fast HTTP response + background work + ASP.NET Core SignalR updates</text>

  <rect class="note" x="210" y="118" width="780" height="72" />
  <text class="note-text" x="600" y="148" text-anchor="middle">The MVC UI does not wait for the heavy task to finish.</text>
  <text class="note-text" x="600" y="172" text-anchor="middle">The API returns a JobId immediately, then progress is pushed back later.</text>

  <g transform="translate(250,230)">
    <rect class="box browser" x="0" y="0" width="700" height="82" />
    <rect class="tag-bg-browser" x="20" y="18" width="86" height="28" rx="6" ry="6" />
    <text class="tag" x="63" y="37" text-anchor="middle">BROWSER</text>
    <text class="step" x="128" y="34">1. User clicks Start Job</text>
    <text class="detail" x="128" y="60">User starts one long-running job from the web page.</text>
  </g>

  <path class="arrow" d="M600 312 L600 360" />

  <g transform="translate(250,360)">
    <rect class="box ui" x="0" y="0" width="700" height="92" />
    <rect class="tag-bg-ui" x="20" y="18" width="62" height="28" rx="6" ry="6" />
    <text class="tag" x="51" y="37" text-anchor="middle">MVC UI</text>
    <text class="step" x="104" y="34">2. MVC UI sends AJAX POST to Framework API</text>
    <text class="detail" x="104" y="62">POST http://localhost:5002/api/jobs/start</text>
  </g>

  <path class="arrow" d="M600 452 L600 500" />

  <g transform="translate(250,500)">
    <rect class="box api" x="0" y="0" width="700" height="92" />
    <rect class="tag-bg-api" x="20" y="18" width="120" height="28" rx="6" ry="6" />
    <text class="tag" x="80" y="37" text-anchor="middle">FRAMEWORK API</text>
    <text class="step" x="162" y="34">3. Framework API creates JobId</text>
    <text class="detail" x="162" y="62">A GUID identifies this one job cycle.</text>
  </g>

  <path class="arrow" d="M600 592 L600 640" />

  <g transform="translate(250,640)">
    <rect class="box api" x="0" y="0" width="700" height="92" />
    <rect class="tag-bg-api" x="20" y="18" width="120" height="28" rx="6" ry="6" />
    <text class="tag" x="80" y="37" text-anchor="middle">FRAMEWORK API</text>
    <text class="step" x="162" y="34">4. Framework API starts background task</text>
    <text class="detail" x="162" y="62">The heavy work starts outside the original HTTP request.</text>
  </g>

  <path class="arrow" d="M600 732 L600 780" />

  <g transform="translate(250,780)">
    <rect class="box api" x="0" y="0" width="700" height="92" />
    <rect class="tag-bg-api" x="20" y="18" width="120" height="28" rx="6" ry="6" />
    <text class="tag" x="80" y="37" text-anchor="middle">FRAMEWORK API</text>
    <text class="step" x="162" y="34">5. API immediately returns 202 Accepted + JobId</text>
    <text class="detail" x="162" y="62">The browser gets a fast response instead of waiting.</text>
  </g>

  <path class="arrow" d="M600 872 L600 920" />

  <g transform="translate(250,920)">
    <rect class="box browser" x="0" y="0" width="700" height="92" />
    <rect class="tag-bg-browser" x="20" y="18" width="86" height="28" rx="6" ry="6" />
    <text class="tag" x="63" y="37" text-anchor="middle">BROWSER</text>
    <text class="step" x="128" y="34">6. Browser connects to ASP.NET Core SignalR hub</text>
    <text class="detail" x="128" y="62">https://localhost:5003/hubs/jobstatus</text>
  </g>

  <path class="arrow" d="M600 1012 L600 1060" />

  <g transform="translate(250,1060)">
    <rect class="box hub" x="0" y="0" width="700" height="92" />
    <rect class="tag-bg-hub" x="20" y="18" width="102" height="28" rx="6" ry="6" />
    <text class="tag" x="71" y="37" text-anchor="middle">SIGNALR HUB</text>
    <text class="step" x="144" y="34">7. Browser joins job:{jobId} group</text>
    <text class="detail" x="144" y="62">Only clients in the matching job group receive updates.</text>
  </g>

  <path class="arrow" d="M600 1152 L600 1200" />

  <g transform="translate(250,1200)">
    <rect class="box api" x="0" y="0" width="700" height="102" />
    <rect class="tag-bg-api" x="20" y="18" width="120" height="28" rx="6" ry="6" />
    <text class="tag" x="80" y="37" text-anchor="middle">FRAMEWORK API</text>
    <text class="step" x="162" y="34">8. Background task updates status</text>
    <text class="detail" x="162" y="62">Started, Processing step 1, step 2, step 3, Completed</text>
    <text class="detail" x="162" y="84">Each update is posted to the RealtimeHub.</text>
  </g>

  <path class="arrow" d="M600 1302 L600 1350" />

  <g transform="translate(250,1350)">
    <rect class="box hub" x="0" y="0" width="700" height="92" />
    <rect class="tag-bg-hub" x="20" y="18" width="102" height="28" rx="6" ry="6" />
    <text class="tag" x="71" y="37" text-anchor="middle">REALTIMEHUB</text>
    <text class="step" x="144" y="34">9. Hub pushes JobStatusUpdated to job:{jobId}</text>
    <text class="detail" x="144" y="62">The event is sent only to the matching browser group.</text>
  </g>

  <path class="arrow" d="M600 1442 L600 1490" />

  <g transform="translate(250,1490)">
    <rect class="box browser" x="0" y="0" width="700" height="82" />
    <rect class="tag-bg-browser" x="20" y="18" width="86" height="28" rx="6" ry="6" />
    <text class="tag" x="63" y="37" text-anchor="middle">BROWSER</text>
    <text class="step" x="128" y="34">10. Browser updates progress log until Completed</text>
    <text class="detail" x="128" y="60">The user sees realtime status without refreshing the page.</text>
  </g>
</svg>
