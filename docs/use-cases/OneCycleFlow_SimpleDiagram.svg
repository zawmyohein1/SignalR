<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">One Cycle Flow - Realtime Leave Calculation</title>
  <desc id="desc">A simple visual flow that shows the MVC UI, API, SignalR hub, and browser updates for one calculation cycle.</desc>

  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 36px; font-weight: 700; fill: #18212b; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #556371; }
      .hint { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #657384; }
      .section { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #334155; }
      .box-title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #18212b; }
      .box-text { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #5c6a79; }
      .tag-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; }
      .box { fill: #ffffff; stroke-width: 2.5; rx: 14; ry: 14; }
      .browser { stroke: #e59f24; }
      .ui { stroke: #5b7ee5; }
      .api { stroke: #55a44f; }
      .hub { stroke: #8b63f0; }
      .decision { fill: #fffdf3; stroke: #cba11d; stroke-width: 2.5; rx: 20; ry: 20; }
      .tag-ui { fill: #5b7ee5; }
      .tag-api { fill: #55a44f; }
      .tag-hub { fill: #8b63f0; }
      .tag-browser { fill: #e59f24; }
      .tag-decision { fill: #cba11d; }
      .arrow { stroke: #667487; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #7b8898; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .lane-enabled { fill: #edf9ed; stroke: #c9e8c9; stroke-width: 2; rx: 18; ry: 18; }
      .lane-disabled { fill: #fbfbfd; stroke: #dde3ea; stroke-width: 2; rx: 18; ry: 18; }
      .ok { fill: #4f9b57; }
      .off { fill: #2f3640; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #6b7786; }
      .badge { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #ffffff; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="9" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#667487" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100" />

  <text class="title" x="800" y="58" text-anchor="middle">One Cycle Flow</text>
  <text class="subtitle" x="800" y="90" text-anchor="middle">Fast HTTP response when SignalR is on, or normal HTTP completion when SignalR is off</text>
  <text class="hint" x="1540" y="90" text-anchor="end">One browser must receive one job only</text>

  <text class="section" x="60" y="150">Start</text>

  <g transform="translate(60,180)">
    <rect class="box browser" x="0" y="0" width="250" height="96" />
    <rect class="tag-browser" x="20" y="18" width="86" height="26" rx="6" ry="6" fill="#e59f24" />
    <text class="tag-text" x="63" y="35" text-anchor="middle">BROWSER</text>
    <text class="box-title" x="128" y="42">Click Process</text>
    <text class="box-text" x="20" y="68">User starts one leave calculation.</text>
  </g>

  <path class="arrow" d="M 310 228 L 400 228" />

  <g transform="translate(400,180)">
    <rect class="box ui" x="0" y="0" width="260" height="96" />
    <rect class="tag-ui" x="20" y="18" width="62" height="26" rx="6" ry="6" fill="#5b7ee5" />
    <text class="tag-text" x="51" y="35" text-anchor="middle">MVC UI</text>
    <text class="box-title" x="104" y="42">Send request</text>
    <text class="box-text" x="20" y="68">UI controller calls the API.</text>
  </g>

  <path class="arrow" d="M 660 228 L 750 228" />

  <g transform="translate(750,180)">
    <rect class="box api" x="0" y="0" width="300" height="96" />
    <rect class="tag-api" x="20" y="18" width="58" height="26" rx="6" ry="6" fill="#55a44f" />
    <text class="tag-text" x="49" y="35" text-anchor="middle">API</text>
    <text class="box-title" x="96" y="42">Create Calculation Id</text>
    <text class="box-text" x="20" y="68">Save the initial state in XML.</text>
  </g>

  <path class="arrow" d="M 1050 228 L 1130 228" />

  <g transform="translate(1130,162)">
    <rect class="decision" x="0" y="0" width="210" height="140" />
    <rect class="tag-decision" x="58" y="18" width="94" height="26" rx="6" ry="6" fill="#cba11d" />
    <text class="tag-text" x="105" y="35" text-anchor="middle">CHECK</text>
    <text class="box-title" x="105" y="68" text-anchor="middle">SignalR enabled?</text>
    <text class="box-text" x="105" y="96" text-anchor="middle">Yes = background + realtime</text>
    <text class="box-text" x="105" y="118" text-anchor="middle">No = normal HTTP completion</text>
  </g>

  <text class="small" x="1320" y="220">No</text>
  <path class="arrow-soft" d="M 1340 228 L 1400 228 L 1400 790" />
  <text class="small" x="1244" y="320">Yes</text>
  <path class="arrow-soft" d="M 1235 302 L 1235 390" />

  <text class="section" x="60" y="360">SignalR Enabled Path</text>
  <text class="section" x="60" y="760">SignalR Disabled Path</text>

  <g transform="translate(60,390)">
    <rect class="lane-enabled" x="0" y="0" width="1480" height="320" />

    <g transform="translate(30,36)">
      <rect class="box api" x="0" y="0" width="250" height="92" />
      <rect class="tag-api" x="18" y="16" width="58" height="24" rx="6" ry="6" fill="#55a44f" />
      <text class="tag-text" x="47" y="33" text-anchor="middle">API</text>
      <text class="box-title" x="92" y="38">Start background task</text>
      <text class="box-text" x="18" y="63">Work continues after the response.</text>
    </g>

    <path class="arrow" d="M 285 82 L 355 82" />

    <g transform="translate(355,36)">
      <rect class="box api" x="0" y="0" width="260" height="92" />
      <rect class="tag-api" x="18" y="16" width="58" height="24" rx="6" ry="6" fill="#55a44f" />
      <text class="tag-text" x="47" y="33" text-anchor="middle">API</text>
      <text class="box-title" x="92" y="38">Return 202 Accepted</text>
      <text class="box-text" x="18" y="63">Browser gets the id fast.</text>
    </g>

    <path class="arrow" d="M 615 82 L 685 82" />

    <g transform="translate(685,36)">
      <rect class="box browser" x="0" y="0" width="240" height="92" />
      <rect class="tag-browser" x="18" y="16" width="72" height="24" rx="6" ry="6" fill="#e59f24" />
      <text class="tag-text" x="54" y="33" text-anchor="middle">BROWSER</text>
      <text class="box-title" x="104" y="38">Connect to hub</text>
      <text class="box-text" x="18" y="63">Join the matching group.</text>
    </g>

    <path class="arrow" d="M 925 82 L 995 82" />

    <g transform="translate(995,36)">
      <rect class="box hub" x="0" y="0" width="260" height="92" />
      <rect class="tag-hub" x="18" y="16" width="102" height="24" rx="6" ry="6" fill="#8b63f0" />
      <text class="tag-text" x="69" y="33" text-anchor="middle">REALTIME HUB</text>
      <text class="box-title" x="132" y="38">Push updates</text>
      <text class="box-text" x="18" y="63">Only the matching browser receives them.</text>
    </g>

    <path class="arrow" d="M 1115 128 L 1115 180" />

    <g transform="translate(430,195)">
      <rect class="box browser" x="0" y="0" width="620" height="88" />
      <rect class="tag-browser" x="18" y="16" width="72" height="24" rx="6" ry="6" fill="#e59f24" />
      <text class="tag-text" x="54" y="33" text-anchor="middle">BROWSER</text>
      <text class="box-title" x="108" y="38">Current Status + Progress Log</text>
      <text class="box-text" x="18" y="63">Started -&gt; Processing -&gt; Completed</text>
    </g>
  </g>

  <g transform="translate(60,790)">
    <rect class="lane-disabled" x="0" y="0" width="1480" height="220" />

    <text class="small" x="30" y="26">No = API finishes in the same request. No SignalR connection is needed.</text>

    <g transform="translate(30,42)">
      <rect class="box api" x="0" y="0" width="300" height="92" />
      <rect class="tag-api" x="18" y="16" width="58" height="24" rx="6" ry="6" fill="#55a44f" />
      <text class="tag-text" x="47" y="33" text-anchor="middle">API</text>
      <text class="box-title" x="92" y="38">Run synchronously</text>
      <text class="box-text" x="18" y="63">The full process stays in one request.</text>
    </g>

    <path class="arrow" d="M 330 88 L 400 88" />

    <g transform="translate(400,42)">
      <rect class="box api" x="0" y="0" width="290" height="92" />
      <rect class="tag-api" x="18" y="16" width="58" height="24" rx="6" ry="6" fill="#55a44f" />
      <text class="tag-text" x="47" y="33" text-anchor="middle">API</text>
      <text class="box-title" x="92" y="38">Return final response</text>
      <text class="box-text" x="18" y="63">No realtime push is needed.</text>
    </g>

    <path class="arrow" d="M 690 88 L 760 88" />

    <g transform="translate(760,42)">
      <rect class="box browser" x="0" y="0" width="370" height="92" />
      <rect class="tag-browser" x="18" y="16" width="72" height="24" rx="6" ry="6" fill="#e59f24" />
      <text class="tag-text" x="54" y="33" text-anchor="middle">BROWSER</text>
      <text class="box-title" x="108" y="38">Show final Completed state</text>
      <text class="box-text" x="18" y="63">The browser waits until the request ends.</text>
    </g>
  </g>

  <text class="hint" x="800" y="1060" text-anchor="middle">Use the enabled path to explain realtime updates. Use the disabled path to explain normal HTTP behavior.</text>
</svg>

